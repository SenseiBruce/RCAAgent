spring:
  application:
    name: rca-agent

server:
  port: 8080

rca:
  llm:
    provider: ${LLM_PROVIDER:openrouter}
    max-tokens: ${LLM_MAX_TOKENS:16384}
    bedrock:
      region: ${AWS_REGION:us-east-1}
      model-id: ${BEDROCK_MODEL_ID:anthropic.claude-3-sonnet-20240229-v1:0}
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_MODEL:gpt-4}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    openrouter:
      api-key: ${OPENROUTER_API_KEY:}
      model: ${OPENROUTER_MODEL:anthropic/claude-3.5-sonnet}
      base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
  git:
    default-branch: ${GIT_DEFAULT_BRANCH:main}
    max-commits: ${GIT_MAX_COMMITS:50}
    repo-url: ${GIT_REPO_URL:}
    github-token: ${GITHUB_TOKEN:}
  log:
    max-file-size-mb: ${LOG_MAX_FILE_SIZE_MB:100}
  guardrails:
    max-input-length: ${GUARDRAIL_MAX_INPUT_LENGTH:50000}
    max-log-lines: ${GUARDRAIL_MAX_LOG_LINES:5000}
    max-history-messages: ${GUARDRAIL_MAX_HISTORY:20}
    max-concurrent-analyses: ${GUARDRAIL_MAX_CONCURRENT:5}
    blocked-patterns: ${GUARDRAIL_BLOCKED_PATTERNS:}
    allow-auto-fix: ${GUARDRAIL_ALLOW_AUTOFIX:true}
    require-approval-for-push: ${GUARDRAIL_REQUIRE_APPROVAL:false}
    max-files-per-fix: ${GUARDRAIL_MAX_FILES_PER_FIX:10}
    allowed-repo-patterns: ${GUARDRAIL_ALLOWED_REPOS:}

logging:
  level:
    com.rca.agent: ${LOG_LEVEL:INFO}
    io.netty.resolver.dns: OFF

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${ENVIRONMENT:development}
